name: ci-api

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install (frozen)
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: Mypy strict
        run: uv run mypy --strict src/

      - name: Pytest
        # conftest.py sets placeholder env vars before imports, so no
        # real secrets need to exist in CI.
        run: uv run pytest -q
