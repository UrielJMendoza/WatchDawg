name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    env:
      SERVICE: watchdawg-api
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.GCP_AR_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        working-directory: apps/api
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --set-env-vars "ENV=prod,ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --set-secrets "SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role:latest,SUPABASE_ANON_KEY=supabase-anon-key:latest,ANTHROPIC_API_KEY=anthropic-key:latest,CRON_SECRET=cron-secret:latest"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region "${{ env.REGION }}" --format 'value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "::notice title=Cloud Run URL::$URL"
          curl -fsSL "$URL/health" || echo "WARNING: /health unreachable"
